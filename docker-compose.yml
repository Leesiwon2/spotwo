version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: spotwo-db
    environment:
      MYSQL_DATABASE: spotwo
      MYSQL_USER: spotwo
      MYSQL_PASSWORD: spotwo1234
      MYSQL_ROOT_PASSWORD: root1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio
    container_name: spotwo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data: