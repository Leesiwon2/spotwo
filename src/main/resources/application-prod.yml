spring:
  datasource:
    url: jdbc:mysql://spotwo-db.cvuyguuge9i6.ap-northeast-2.rds.amazonaws.com:3306/spotwo?useSSL=true&serverTimezone=Asia/Seoul
    username: admin
    password: spotwo-db!
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "https://d1lzshhga930qd.cloudfront.net/login/oauth2/code/kakao"  # ← 직접 입력!
            scope:
              - profile_nickname
              - profile_image
storage:
  type: s3

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: spotwo-photos
    region:
      static: ap-northeast-2